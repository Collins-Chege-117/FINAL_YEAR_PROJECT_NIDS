<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NIDS | Login</title>
    <link href="https://jsdelivr.net" rel="stylesheet">
    <link rel="stylesheet" href="https://cloudflare.com">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
</head>
<body class="auth-body">
    <div class="container">
        <div class="auth-card">
            <h1>Login</h1>
            <div class="auth-divider"></div>

            {% with messages = get_flashed_messages() %}
                {% if messages %}{% for m in messages %}
                    <div class="alert alert-light py-2 small">{{ m }}</div>
                {% endfor %}{% endif %}
            {% endwith %}

            <form method="POST">
                <div class="form-group-custom">
                    <i class="fa fa-user input-icon"></i>
                    <input type="email" name="email" class="form-input" placeholder="Your Email Address" required>
                </div>
                <div class="form-group-custom">
                    <i class="fa fa-lock input-icon"></i>
                    <input type="password" name="password" class="form-input" placeholder="Password" required>
                </div>

                <p class="small">Don't have an account? <a href="/signup" class="text-white fw-bold">Sign Up</a></p>
                <button type="submit" class="btn-auth">LOGIN</button>
                <button type="button" class="btn-google"><i class="fab fa-google me-2"></i> Login with Google</button>
            </form>

            <div class="social-footer">
                <i class="fa-solid fa-envelope"></i>
                <i class="fa-solid fa-globe"></i>
                <i class="fa-brands fa-github"></i>
                <i class="fa-brands fa-linkedin"></i>
            </div>
            <p class="mt-3 small opacity-75">© 2026 NIDS</p>
        </div>
    </div>
</body>
</html>
