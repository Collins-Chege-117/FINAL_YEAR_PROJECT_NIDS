<!DOCTYPE html>
<html>
<head>
    <title>Waiting for Payment</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/console.css') }}">
    <style>
        .loader { border: 16px solid #f3f3f3; border-top: 16px solid #3498db; border-radius: 50%; width: 120px; height: 120px; animation: spin 2s linear infinite; margin: auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body style="text-align: center; padding-top: 100px;">
    <h2>Processing M-Pesa Payment...</h2>
    <div class="loader"></div>
    <p>Please check your phone and enter your M-Pesa PIN.</p>
    <p>Do not close this window. We will redirect you automatically once confirmed.</p>

    <script>
        function checkStatus() {
            fetch('/api/check-payment')
                .then(res => res.json())
                .then(data => {
                    if (data.paid) {
                        window.location.href = "/login";
                    }
                });
        }
        setInterval(checkStatus, 3000); // Check every 3 seconds
    </script>
</body>
</html>
