<div class="container text-white mt-5">
    <h3>Step 3: Setup Notifications & Reports</h3>
    <div class="card bg-dark border-secondary p-4 mt-3">
        <form action="/update_notifications" method="POST">
            <label>Gmail Address:</label>
            <input type="email" name="smtp_email" class="form-control mb-3" value="{{ current_user.email }}">
            
            <label>Gmail App Password (16 characters):</label>
            <input type="password" name="smtp_password" class="form-control mb-3" required>
            
            <div class="form-check mb-3">
                <input type="checkbox" name="enabled" class="form-check-input" checked>
                <label class="form-check-label">Enable Real-time Email Alerts</label>
            </div>
            <button type="submit" class="btn btn-primary">Save Settings</button>
        </form>
    </div>
    <div class="mt-5">
        <a href="/dashboard/download-report" class="btn btn-outline-info">📄 Generate 24hr PDF Report</a>
    </div>
</div>
